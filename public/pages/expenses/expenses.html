<!-- EXPENSES PAGE -->

<div class="container page-container">
  <div class="page-header">
    <h1 class="page-title">הוצאות</h1>
    <button class="button button-primary" id="addExpenseBtn">הוסף הוצאה</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <select id="monthFilter" class="filter-select">
      <option value="">לחודש זה</option>
      <option value="1">ינואר</option>
      <option value="2">פברואר</option>
      <option value="3">מרץ</option>
      <option value="4">אפריל</option>
      <option value="5">מאי</option>
      <option value="6">יוני</option>
      <option value="7">יולי</option>
      <option value="8">אוגוסט</option>
      <option value="9">ספטמבר</option>
      <option value="10">אוקטובר</option>
      <option value="11">נובמבר</option>
      <option value="12">דצמבר</option>
    </select>

    <select id="categoryFilter" class="filter-select">
      <option value="">כל הקטגוריות</option>
      <option value="rent">דירה</option>
      <option value="utilities">שירותים</option>
      <option value="food">מזון</option>
      <option value="other">אחרים</option>
    </select>
  </div>

  <!-- EXPENSES LIST -->
  <div id="expensesList" class="expenses-list">מטען...</div>

  <!-- TOTAL SUM -->
  <div class="card total-card">
    <h3>סה"כ הוצאות: <span id="totalExpenses">₪0</span></h3>
  </div>
</div>

<!-- ADD EXPENSE DIALOG -->
<div class="dialog-overlay" id="addExpenseDialog" style="display: none;">
  <div class="dialog-content">
    <h2>הוסף הוצאה</h2>

    <form id="expenseForm">
      <div class="form-group">
        <label for="expenseAmount">סכום (₪)</label>
        <input type="number" id="expenseAmount" min="0" step="0.01" required />
      </div>

      <div class="form-group">
        <label for="expenseCategory">קטגוריה</label>
        <select id="expenseCategory" required>
          <option value="">בחר קטגוריה</option>
          <option value="rent">דירה</option>
          <option value="utilities">שירותים</option>
          <option value="food">מזון</option>
          <option value="other">אחרים</option>
        </select>
      </div>

      <div class="form-group">
        <label for="expenseDescription">תיאור</label>
        <textarea id="expenseDescription" rows="3"></textarea>
      </div>

      <div class="dialog-buttons">
        <button type="submit" class="button button-primary">שמור</button>
        <button type="button" class="button button-secondary" id="cancelExpense">ביטול</button>
      </div>
    </form>
  </div>
</div>
