<!-- TICKETS PAGE -->

<div class="container page-container">
  <div class="page-header">
    <h1 class="page-title">כרטיסים</h1>
    <button class="button button-primary" id="addTicketBtn">פתח כרטיס חדש</button>
  </div>

  <div class="filters">
    <select id="statusFilter" class="filter-select">
      <option value="">כל הסטטוסים</option>
      <option value="open">פתוח</option>
      <option value="in-progress">בעבודה</option>
      <option value="closed">סגור</option>
    </select>
  </div>

  <div id="ticketsList" class="tickets-list">מטען...</div>
</div>

<!-- ADD TICKET DIALOG -->
<div class="dialog-overlay" id="addTicketDialog" style="display: none;">
  <div class="dialog-content">
    <h2>פתח כרטיס חדש</h2>
    <form id="ticketForm">
      <div class="form-group">
        <label for="ticketTitle">כותרת</label>
        <input type="text" id="ticketTitle" required />
      </div>
      <div class="form-group">
        <label for="ticketDescription">תיאור</label>
        <textarea id="ticketDescription" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label for="ticketPriority">עדיפות</label>
        <select id="ticketPriority">
          <option value="low">נמוכה</option>
          <option value="medium">בינונית</option>
          <option value="high">גבוהה</option>
        </select>
      </div>
      <div class="dialog-buttons">
        <button type="submit" class="button button-primary">פתח</button>
        <button type="button" class="button button-secondary" id="cancelTicket">ביטול</button>
      </div>
    </form>
  </div>
</div>
