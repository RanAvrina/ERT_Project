<!-- REGISTER PAGE -->

<div class="container page-container">
  <h1 class="page-title">הרשמה</h1>

  <div class="error-message" id="errorMessage" style="display: none;"></div>

  <form id="registerForm" class="register-form">
    <!-- FULL NAME -->
    <div class="form-group">
      <label for="fullName">שם מלא</label>
      <input type="text" id="fullName" name="fullName" required />
      <span class="error-text" id="fullNameError"></span>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label for="email">כתובת אימייל</label>
      <input type="email" id="email" name="email" required />
      <span class="error-text" id="emailError"></span>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label for="password">סיסמה</label>
      <input type="password" id="password" name="password" required />
      <span class="error-text" id="passwordError"></span>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="form-group">
      <label for="confirmPassword">אישור סיסמה</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required />
      <span class="error-text" id="confirmPasswordError"></span>
    </div>

    <!-- PHONE -->
    <div class="form-group">
      <label for="phone">טלפון</label>
      <input type="tel" id="phone" name="phone" />
      <span class="error-text" id="phoneError"></span>
    </div>

    <!-- TERMS -->
    <div class="form-group checkbox">
      <input type="checkbox" id="agreeTerms" name="agreeTerms" required />
      <label for="agreeTerms" class="checkbox-label">אני מסכים לתנאי השימוש</label>
      <span class="error-text" id="agreeTermsError"></span>
    </div>

    <button type="submit" class="button button-primary" id="submitBtn">
      הרשם
    </button>
  </form>

  <p class="register-footer">
    כבר יש לך חשבון? <a href="./pages/login/login.html" class="link">התחבר</a>
  </p>
</div>
