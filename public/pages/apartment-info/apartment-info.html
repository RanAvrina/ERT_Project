<!-- APARTMENT INFO PAGE -->

<div class="container page-container">
  <h1 class="page-title">מידע על הדירה</h1>

  <div class="apartment-info-grid">
    <div class="info-card">
      <h3>של</h3>
      <p id="apartmentAddress">טוען...</p>
    </div>
    <div class="info-card">
      <h3>שטח</h3>
      <p id="apartmentSize">- מ"ר</p>
    </div>
    <div class="info-card">
      <h3>חדרים</h3>
      <p id="apartmentRooms">- חדרים</p>
    </div>
    <div class="info-card">
      <h3>שכירות</h3>
      <p id="apartmentRent">₪-</p>
    </div>
  </div>

  <div class="card">
    <h2>תיאור הדירה</h2>
    <p id="apartmentDescription">-</p>
  </div>

  <div class="card">
    <h2>שירותים בדירה</h2>
    <ul id="amenitiesList" style="list-style: none; padding: 0;">
      <li>טוען...</li>
    </ul>
  </div>

  <button class="button button-primary" id="editApartmentBtn">ערוך פרטים</button>
</div>

<!-- EDIT APARTMENT DIALOG -->
<div class="dialog-overlay" id="editApartmentDialog" style="display: none;">
  <div class="dialog-content">
    <h2>ערוך פרטי דירה</h2>
    <form id="apartmentForm">
      <div class="form-group">
        <label for="address">כתובת</label>
        <input type="text" id="address" />
      </div>
      <div class="form-group">
        <label for="size">שטח (מ"ר)</label>
        <input type="number" id="size" />
      </div>
      <div class="form-group">
        <label for="rooms">מספר חדרים</label>
        <input type="number" id="rooms" />
      </div>
      <div class="form-group">
        <label for="rent">שכירות (₪)</label>
        <input type="number" id="rent" />
      </div>
      <div class="dialog-buttons">
        <button type="submit" class="button button-primary">שמור</button>
        <button type="button" class="button button-secondary" id="cancelEdit">ביטול</button>
      </div>
    </form>
  </div>
</div>
