<!-- PAYMENTS PAGE -->

<div class="container page-container">
  <h1 class="page-title">תשלומים</h1>

  <div class="payments-summary">
    <div class="card summary-card">
      <h3>יתרה כוללת</h3>
      <p id="totalBalance" class="balance-amount">₪0</p>
    </div>
    <div class="card summary-card">
      <h3>תשלום לי</h3>
      <p id="ownedAmount" class="amount-positive">₪0</p>
    </div>
    <div class="card summary-card">
      <h3>עליי לשלם</h3>
      <p id="oweAmount" class="amount-negative">₪0</p>
    </div>
  </div>

  <div id="paymentsList" class="payments-list">מטען...</div>

  <button class="button button-primary" id="recordPaymentBtn" style="margin-top: 2rem;">
    רשום תשלום
  </button>
</div>

<!-- RECORD PAYMENT DIALOG -->
<div class="dialog-overlay" id="recordPaymentDialog" style="display: none;">
  <div class="dialog-content">
    <h2>רשום תשלום</h2>
    <form id="paymentForm">
      <div class="form-group">
        <label for="paymentAmount">סכום (₪)</label>
        <input type="number" id="paymentAmount" min="0" step="0.01" required />
      </div>
      <div class="form-group">
        <label for="paymentFrom">משלם</label>
        <select id="paymentFrom" required></select>
      </div>
      <div class="form-group">
        <label for="paymentTo">מקבל</label>
        <select id="paymentTo" required></select>
      </div>
      <div class="dialog-buttons">
        <button type="submit" class="button button-primary">שמור</button>
        <button type="button" class="button button-secondary" id="cancelPayment">ביטול</button>
      </div>
    </form>
  </div>
</div>
